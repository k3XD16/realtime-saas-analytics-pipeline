version: '3.8'
services:
  metabase-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabasepassword
      POSTGRES_DB: metabase_metadata
    volumes:
      - metabase-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "metabase"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_metadata
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabasepassword
      MB_DB_HOST: metabase-postgres
    depends_on:
      metabase-postgres:
        condition: service_healthy
    restart: always

volumes:
  metabase-db-data:
